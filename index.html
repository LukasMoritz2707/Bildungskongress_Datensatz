<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bildungskongress Datensatz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }
    .page { padding: 16px; }
    h1 { text-align: center; margin-bottom: 24px; }

    .card-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .card {
      flex: 1 1 220px;
      max-width: 280px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      text-align: center;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }
    .card.active {
      border-color: #2d6cdf;
      box-shadow: 0 0 0 3px rgba(45,108,223,0.15);
    }
    .card.inactive {
      opacity: 0.45;
      transform: scale(0.96);
    }

    .section {
      display: none;
      width: 100%;
    }
    .section.active {
      display: block;
    }

    .subtopics {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .topic-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      min-width: 220px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .topic-card.active {
      border-color: #2d6cdf;
    }

    .detail-view {
      display: none;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
    }
    .detail-view.active {
      display: block;
    }

    .graphs-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .graph-box, .prompt-box-wrap {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .graph-box img {
      width: 100%;
      height: auto;
      display: block;
      cursor: zoom-in;
    }

    .prompt-text {
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.4;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #2d6cdf;
      cursor: pointer;
      text-decoration: underline;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      padding: 20px;
      box-sizing: border-box;
    }
    .modal.open {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal img {
      max-width: 95vw;
      max-height: 95vh;
      background: white;
      border-radius: 10px;
    }

    @media (max-width: 700px) {
      .graphs-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Bildungskongress Datensatz</h1>
    <div id="mainCards" class="card-row"></div>
    <div id="app"></div>
  </div>

  <div class="modal" id="imageModal" onclick="closeModal()">
    <img id="modalImage" src="" alt="Großansicht">
  </div>

  <script>
    const mainCards = document.getElementById("mainCards");
    const app = document.getElementById("app");

    let DATA = {};

    async function init() {
      const res = await fetch("data.json");
      DATA = await res.json();
      renderMainCards();
    }

    function renderMainCards() {
      mainCards.innerHTML = Object.entries(DATA).map(([key, subject]) => `
        <div class="card" data-subject="${key}">
          <h2>${subject.title}</h2>
          <p>${subject.description}</p>
        </div>
      `).join("");

      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => renderSubject(card.dataset.subject));
      });
    }

    function renderSubject(subjectKey) {
      const subject = DATA[subjectKey];

      document.querySelectorAll(".card").forEach(c => {
        c.classList.toggle("active", c.dataset.subject === subjectKey);
        c.classList.toggle("inactive", c.dataset.subject !== subjectKey);
      });

      app.innerHTML = `
        <div class="section active">
          <span class="back-link" id="backToMain"></span>
          <h2>${subject.title}</h2>
          <div class="subtopics">
            ${subject.topics.map(topic => `
              <div class="topic-card" data-topic="${topic.key}">
                <strong>${topic.title}</strong>
              </div>
            `).join("")}
          </div>
          <div id="detailView" class="detail-view"></div>
        </div>
      `;

      document.getElementById("backToMain").addEventListener("click", backToMain);

      document.querySelectorAll(".topic-card").forEach(card => {
        card.addEventListener("click", () => renderTopic(subjectKey, card.dataset.topic));
      });
    }

    function renderTopic(subjectKey, topicKey) {
      const subject = DATA[subjectKey];
      const topic = subject.topics.find(t => t.key === topicKey);

      document.querySelectorAll(".topic-card").forEach(c => {
        c.classList.toggle("active", c.dataset.topic === topicKey);
      });

      const detailView = document.getElementById("detailView");
      detailView.classList.add("active");
      detailView.innerHTML = `
        <h3>${topic.title}</h3>
        <div class="graphs-row">
          ${topic.graphs.map(g => `
            <div class="graph-box">
              <h4>${g.title}</h4>
              <img src="${g.src}" alt="${g.alt}" onclick="openModal(this.src)">
            </div>
          `).join("")}
        </div>
        <div class="prompt-box-wrap">
          <h4>Prompt</h4>
          <pre class="prompt-text" data-path="${topic.prompt}">Loading...</pre>
        </div>
      `;

      loadPrompt(detailView.querySelector(".prompt-text"));
    }

    async function loadPrompt(preEl) {
      try {
        const res = await fetch(preEl.dataset.path);
        preEl.textContent = await res.text();
      } catch {
        preEl.textContent = "Could not load prompt.";
      }
    }

    function backToMain() {
      app.innerHTML = "";
      document.querySelectorAll(".card").forEach(c => c.classList.remove("active", "inactive"));
    }

    function openModal(src) {
      document.getElementById("modalImage").src = src;
      document.getElementById("imageModal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("imageModal").classList.remove("open");
    }

    init();
  </script>
</body>
</html>
